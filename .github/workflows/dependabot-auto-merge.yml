name: dependabot-auto-merge

# Auto-merge Dependabot PRs that pass the `ci` aggregate gate.
#
# Policy (2026-06-29): auto-merge ALL Dependabot PRs (npm, github-actions,
# docker). The `ci` aggregate is the sole safety gate — no human review
# requirement on this solo-operated repo.
#
# npm semver-major bumps still get a low-priority ntfy ping (informational;
# they are NOT parked — CI green means merge).
#
# Squash-merging on green main triggers `docker-latest.yml` -> Docker Hub
# `:latest` -> Coolify reconcile.

on: pull_request

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]' && github.repository == 'introVRt-Lounge/hello-dalle-discordbot'
    steps:
      - name: Checkout (for local composite actions)
        uses: actions/checkout@v7

      - name: Fetch Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@v3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge (CI is the gate)
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr merge "$PR_URL" --auto --squash

      - name: Notify ntfy on npm major bumps (informational)
        if: steps.meta.outputs.update-type == 'version-update:semver-major'
        uses: ./.github/actions/ntfy
        with:
          url: ${{ secrets.NTFY_URL }}
          token: ${{ secrets.NTFY_TOKEN }}
          title: "Dependabot major bump auto-queued"
          message: |
            ${{ steps.meta.outputs.dependency-names }} -> ${{ steps.meta.outputs.new-version }}
            PR ${{ github.event.pull_request.number }} will merge when ci is green.
          priority: low
          tags: package,octocat
          click: ${{ github.event.pull_request.html_url }}
