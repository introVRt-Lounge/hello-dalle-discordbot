name: manual-publish

# Emergency / fallback shipping path used when semantic-release is broken
# (see issue #95). Lets a maintainer build and push the current `main`
# (or any branch) to Docker Hub with an explicit tag, bypassing the
# release-tag dependency.
#
# Usage:
#   gh workflow run manual-publish -f tag=v1.31.3
#   gh workflow run manual-publish -f tag=v1.32.0 -f also_latest=false
#
# Requires repo secrets DOCKER_USERNAME and DOCKER_PASSWORD (already configured;
# same secrets the broken release.yml uses).

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag to publish (e.g. v1.31.3). Use a clean SemVer; the workflow will not validate.'
        required: true
        type: string
      also_latest:
        description: 'Also push :latest (true/false)'
        required: false
        default: 'true'
        type: string
      create_release:
        description: 'Create a matching GitHub release (true/false)'
        required: false
        default: 'true'
        type: string

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Validate inputs
        env:
          TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.-]+)?$ ]]; then
            echo "::error::tag '$TAG' is not vMAJOR.MINOR.PATCH (e.g. v1.31.3)"
            exit 1
          fi
          if git rev-parse "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "::error::tag '$TAG' already exists in this repo"
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Generate version files
        env:
          TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          echo "${TAG#v}" > version.txt
          {
            echo "VERSION=${TAG#v}"
            echo "BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            echo "GIT_COMMIT=${GITHUB_SHA}"
          } > .env.version

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build tag list
        id: tags
        env:
          TAG: ${{ inputs.tag }}
          ALSO_LATEST: ${{ inputs.also_latest }}
        run: |
          set -euo pipefail
          IMAGE='heavygee/hello-dalle-discordbot'
          {
            echo "tags<<EOF"
            echo "${IMAGE}:${TAG#v}"
            if [ "$ALSO_LATEST" = "true" ]; then
              echo "${IMAGE}:latest"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: production
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          build-args: |
            VERSION=${{ inputs.tag }}
            GIT_COMMIT=${{ github.sha }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ inputs.tag }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create git tag and GitHub release
        if: ${{ inputs.create_release == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git tag -a "$TAG" -m "$TAG"
          git push origin "refs/tags/$TAG"
          # GitHub creates the release tied to the existing tag; do not pass --target,
          # it conflicts with an already-pushed tag and returns HTTP 422.
          PREV_TAG=$(gh api "repos/${GITHUB_REPOSITORY}/releases/latest" --jq '.tag_name' 2>/dev/null || echo '')
          if [ -n "$PREV_TAG" ]; then
            gh release create "$TAG" --title "$TAG" --generate-notes --notes-start-tag "$PREV_TAG"
          else
            gh release create "$TAG" --title "$TAG" --generate-notes
          fi

      - name: Summary
        env:
          TAG: ${{ inputs.tag }}
          ALSO_LATEST: ${{ inputs.also_latest }}
          CREATE_RELEASE: ${{ inputs.create_release }}
        run: |
          {
            echo "## Manual publish complete"
            echo ""
            echo "- Image: \`heavygee/hello-dalle-discordbot:${TAG}\`"
            echo "- Also \`:latest\`: \`${ALSO_LATEST}\`"
            echo "- GitHub release: \`${CREATE_RELEASE}\`"
            echo "- Commit: \`${GITHUB_SHA}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Notify ntfy on failure
        if: failure()
        uses: ./.github/actions/ntfy
        with:
          url: ${{ secrets.NTFY_URL }}
          token: ${{ secrets.NTFY_TOKEN }}
          title: "manual-publish ${{ inputs.tag }} failed"
          message: |
            Operator-triggered manual SemVer publish of ${{ inputs.tag }} failed on commit ${{ github.sha }}.
            Image was NOT pushed to Docker Hub. Re-run after fixing the cause.
          priority: high
          tags: rotating_light,whale,bookmark
          click: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
